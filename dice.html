<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Roller</title>
    <h1 style="color:rgb(52, 124, 206);">Random number generator for competion marshalling.  (Possible number 1 through 6)</h1>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }

        #dice {
            font-size: 150px;
            margin-bottom: 30px;
            user-select: none;
        }

        button {
            font-size: 24px;
            padding: 15px 30px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background: #0078d7;
            color: white;
        }

        button:hover {
            background: #005fa3;
        }

        .rolling {
            animation: spin 0.15s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="dice">🎲</div>

    <button onclick="rollDice()">Roll Dice</button>

    <script>
        const diceFaces = ["⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
        let rolling = false;

        function rollDice() {
            if (rolling) return;

            rolling = true;

            const dice = document.getElementById("dice");
            dice.classList.add("rolling");

            const animation = setInterval(() => {
                const temp = Math.floor(Math.random() * 6);
                dice.textContent = diceFaces[temp];
            }, 75);

            setTimeout(() => {
                clearInterval(animation);

                const result = Math.floor(Math.random() * 6);
                dice.textContent = diceFaces[result];

                dice.classList.remove("rolling");
                rolling = false;
            }, 1000);
        }
    </script>

    <a href="index.html" class="back">← Back</a>

</body>
</html>
